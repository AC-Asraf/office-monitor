    async function uploadFloorPlan(floor, file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const base64 = e.target.result.split(',')[1];
          const imageType = file.type.split('/')[1];

          try {
            const response = await fetch(`${API_URL}/api/floor-plans/${encodeURIComponent(floor)}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ image_data: base64, image_type: imageType })
            });
            if (response.ok) {
              await fetchFloorPlans();
              resolve({ success: true });
            } else {
              resolve({ success: false, error: 'Upload failed' });
            }
          } catch (e) {
            resolve({ success: false, error: e.message });
          }
        };
        reader.readAsDataURL(file);
      });
    }

    async function deleteFloorPlan(floor) {
      if (!confirm(`Delete floor plan for ${floor}?`)) return;

      try {
        await fetch(`${API_URL}/api/floor-plans/${encodeURIComponent(floor)}`, { method: 'DELETE' });
        await fetchFloorPlans();
        renderAdmin();
      } catch (e) {

    function toggleEditMode() {
      if (editMode) {
        // Exiting edit mode - ask to discard unsaved changes
        if (Object.keys(pendingPositions).length > 0) {
          if (!confirm('You have unsaved position changes. Discard them?')) {
            return;
          }
          pendingPositions = {};
        }
      }
      editMode = !editMode;
      render();
    }

    async function savePositionChanges() {
      const changes = Object.entries(pendingPositions);
      if (changes.length === 0) {
        alert('No changes to save');
        return;
      }

      let saved = 0;
      for (const [deviceId, pos] of changes) {
        let success = false;
        if (pos.isRoom) {
          // Save room position
          success = await saveRoomPosition(deviceId, pos.x, pos.y, pos.floor);
        } else {
          // Save monitor position
          success = await saveDevicePosition(deviceId, pos.x, pos.y);
        }
        if (success) saved++;
      }

      pendingPositions = {};
      editMode = false;
      await fetchAllData();
      render();
      alert(`Saved positions for ${saved} item(s)`);
    }

    async function saveRoomPosition(roomId, pos_x, pos_y, floor) {
      try {
        const response = await authFetch(`${API_URL}/api/room-positions/${encodeURIComponent(roomId)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pos_x, pos_y, floor })
        });
        return response.ok;
      } catch (e) {
        console.error('Failed to save room position:', e);
        return false;
      }
    }

    function cancelPositionChanges() {
      if (Object.keys(pendingPositions).length > 0) {
        if (!confirm('Discard all position changes?')) {
          return;
        }

      pendingPositions = {};
      editMode = false;
      render();

    async function submitMonitor() {
      let deviceType = document.getElementById('edit-device-type').value;

      // Handle custom device type
      if (deviceType === '__custom__') {
        const customTypeName = document.getElementById('edit-custom-device-type').value.trim();
        if (!customTypeName) {
          alert('Please enter a custom device type name');
          return;
        }

        // Create the new device type
        try {
          const response = await authFetch(`${API_URL}/api/device-types`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: customTypeName })
          });
          const data = await response.json();
          if (data.success) {
            deviceType = customTypeName;
            // Refresh custom device types list
            await fetchCustomDeviceTypes();
          } else {
            // Type might already exist, use it anyway
            deviceType = customTypeName;
          }
        } catch (e) {
          // If creation fails, use the name as-is
          deviceType = customTypeName;
        }
      }

      const monitor = {
        ...editingMonitor,
        name: document.getElementById('edit-name').value,
        type: document.getElementById('edit-type').value,
        hostname: document.getElementById('edit-hostname').value,
        url: document.getElementById('edit-url').value,
        floor: document.getElementById('edit-floor').value,
        device_type: deviceType,
        interval: parseInt(document.getElementById('edit-interval').value) || 30
      };

      if (!monitor.name) {
        alert('Name is required');
        return;
      }

      if (monitor.type === 'ping' && !monitor.hostname) {
        alert('Hostname is required for ping monitors');
        return;
      }

      if (monitor.type === 'http' && !monitor.url) {
        alert('URL is required for HTTP monitors');
        return;
      }

      const result = await saveMonitor(monitor);
      if (result.success) {
        closeModal();
        renderAdmin();
      } else {
        alert('Error: ' + (result.error || 'Unknown error'));
      }
    }

        const changes = data.changes || [];

        const container = document.getElementById('pending-changes-list');
        if (!container) return;

        if (changes.length === 0) {
          container.innerHTML = '<p style="color: #64748B; text-align: center; padding: 20px;">No pending changes</p>';
          return;
        }

        container.innerHTML = changes.map(change => {
          const changeData = JSON.parse(change.data);
          return `
            <div class="device-item" style="margin-bottom: 12px;">
              <div class="device-info">
                <div class="device-name">

    // ==================== ANALYTICS SIDEBAR ====================
    let analyticsOpen = false;
    let analyticsDevice = null;
    let analyticsData = null;
    let analyticsRefreshInterval = null;

    async function fetchAnalyticsData(deviceId, isRoom, roomName = null, isPolyDevice = false, polyDeviceData = null) {
      if (isRoom) {
        // Get room devices from polyLensData
        const roomDevices = [];
        Object.values(polyLensData).forEach(floorDevices => {
          floorDevices.forEach(device => {
            if (device.room === roomName) {
              roomDevices.push(device);
            }
          });
        });

        const onlineCount = roomDevices.filter(d => d.connected).length;
        const offlineCount = roomDevices.length - onlineCount;
        const uptime = roomDevices.length > 0 ? ((onlineCount / roomDevices.length) * 100).toFixed(1) : 0;

        return {
          isRoom: true,
          roomName: roomName,
          devices: roomDevices,
          onlineCount,
          offlineCount,
          totalCount: roomDevices.length,
          currentUptime: uptime
        };
      }

      if (isPolyDevice && polyDeviceData) {
        // Fetch real analytics data for Poly device from our database
        try {
          const polyDeviceId = polyDeviceData.id;

          // Fetch uptime stats
          const uptimeRes = await fetch(`${API_URL}/api/poly-devices/${polyDeviceId}/uptime?hours=24`);
          const uptimeData = uptimeRes.ok ? await uptimeRes.json() : null;

          // Fetch history
          const historyRes = await fetch(`${API_URL}/api/poly-devices/${polyDeviceId}/history?limit=50`);
          const historyData = historyRes.ok ? await historyRes.json() : null;

          // Get 7 day uptime
          const uptime7dRes = await fetch(`${API_URL}/api/poly-devices/${polyDeviceId}/uptime?hours=168`);
          const uptime7dData = uptime7dRes.ok ? await uptime7dRes.json() : null;

          // Get 30 day uptime
          const uptime30dRes = await fetch(`${API_URL}/api/poly-devices/${polyDeviceId}/uptime?hours=720`);
          const uptime30dData = uptime30dRes.ok ? await uptime30dRes.json() : null;

          return {
            isPolyDevice: true,
            polyDeviceId: polyDeviceId,
            device: polyDeviceData,
            connected: polyDeviceData.connected,
            name: polyDeviceData.name,
            model: polyDeviceData.hardwareModel,
            ip: polyDeviceData.ip,
            serialNumber: polyDeviceData.serialNumber,
            softwareVersion: polyDeviceData.softwareVersion,
            room: polyDeviceData.room,
            lastSeen: polyDeviceData.lastSeen,
            // Analytics data from our database
            uptime24h: uptimeData?.uptime || 0,
            uptime7d: uptime7dData?.uptime || 0,
            uptime30d: uptime30dData?.uptime || 0,
            totalChecks: uptimeData?.total || 0,
            heartbeats: historyData?.heartbeats || []
          };
        } catch (e) {
          console.error('Failed to fetch Poly device analytics:', e);
          // Fallback to basic data
          return {
            isPolyDevice: true,
            polyDeviceId: polyDeviceId,
            device: polyDeviceData,
            connected: polyDeviceData.connected,
            name: polyDeviceData.name,
            model: polyDeviceData.hardwareModel,
            ip: polyDeviceData.ip,
            serialNumber: polyDeviceData.serialNumber,
            softwareVersion: polyDeviceData.softwareVersion,
            room: polyDeviceData.room,
            lastSeen: polyDeviceData.lastSeen,
            noHistory: true
          };
        }
      }

      try {
        // Fetch uptime stats
        const uptimeRes = await fetch(`${API_URL}/api/monitors/${deviceId}/uptime?hours=24`);
        const uptimeData = uptimeRes.ok ? await uptimeRes.json() : null;

        // Fetch history
        const historyRes = await fetch(`${API_URL}/api/monitors/${deviceId}/history?limit=50`);
        const historyData = historyRes.ok ? await historyRes.json() : null;

        // Get 7 day uptime
        const uptime7dRes = await fetch(`${API_URL}/api/monitors/${deviceId}/uptime?hours=168`);
        const uptime7dData = uptime7dRes.ok ? await uptime7dRes.json() : null;

        // Get 30 day uptime
        const uptime30dRes = await fetch(`${API_URL}/api/monitors/${deviceId}/uptime?hours=720`);
        const uptime30dData = uptime30dRes.ok ? await uptime30dRes.json() : null;

        const result = {
          uptime24h: uptimeData?.uptime || 0,
          uptime7d: uptime7dData?.uptime || 0,
          uptime30d: uptime30dData?.uptime || 0,
          totalChecks: uptimeData?.total || 0,
          heartbeats: historyData?.heartbeats || []
        };

        return result;
      } catch (e) {
        console.error('Failed to fetch analytics:', e);
        return { error: true };
      }
    }

    async function refreshAnalytics() {
      if (!analyticsDevice || !analyticsOpen) return;

      console.log('Refreshing analytics data...');
      analyticsData = await fetchAnalyticsData(
        analyticsDevice.id,
        analyticsDevice.isRoom,
        analyticsDevice.name,
        analyticsDevice.isPolyDevice,
        analyticsDevice.polyDeviceData
      );

      // If it's a printer, also refresh printer-specific status
      if (analyticsDevice.isPrinter) {
        const printerStatus = await fetchPrinterStatus(analyticsDevice.id);
        analyticsData.printerStatus = printerStatus;
      }

      renderAnalyticsSidebar(false);
    }

    async function openAnalytics(deviceId, deviceName, deviceType, isRoom = false, polyDeviceData = null) {
      // Clear any existing refresh interval
      if (analyticsRefreshInterval) {
        clearInterval(analyticsRefreshInterval);
        analyticsRefreshInterval = null;
      }

      const isPolyDevice = polyDeviceData !== null;
      const isPrinter = deviceType === 'printers';
      analyticsDevice = { id: deviceId, name: deviceName, type: deviceType, isRoom, isPolyDevice, polyDeviceData, isPrinter };
      analyticsOpen = true;

      // Render loading state
      renderAnalyticsSidebar(true);

      // Fetch device data (pass roomName for room analytics, or polyDeviceData for individual poly device)
      analyticsData = await fetchAnalyticsData(deviceId, isRoom, deviceName, isPolyDevice, polyDeviceData);

      // If it's a printer, also fetch printer-specific status
      if (isPrinter) {
        const printerStatus = await fetchPrinterStatus(deviceId);
        analyticsData.printerStatus = printerStatus;
      }

      renderAnalyticsSidebar(false);

      // Set up auto-refresh every 30 minutes (1800000 ms)
      analyticsRefreshInterval = setInterval(refreshAnalytics, 30 * 60 * 1000);
      console.log('Analytics auto-refresh enabled (every 30 minutes)');
    }

    function closeAnalytics() {
      // Clear auto-refresh interval
      if (analyticsRefreshInterval) {
        clearInterval(analyticsRefreshInterval);
        analyticsRefreshInterval = null;
        console.log('Analytics auto-refresh disabled');
      }

      analyticsOpen = false;
      analyticsDevice = null;
      analyticsData = null;
      analyticsParentRoom = null;
      document.getElementById('analytics-container').innerHTML = '';
    }

    function renderAnalyticsSidebar(loading = false) {
      if (!analyticsDevice) return;

      const device = analyticsDevice;
      const data = analyticsData;

      // Calculate current status from heartbeats
      const currentStatus = data?.heartbeats?.[0]?.status === 1 ? 'up' : 'down';
      const lastPing = data?.heartbeats?.[0]?.ping;
      const avgPing = data?.heartbeats?.length > 0
        ? (data.heartbeats.filter(h => h.ping).reduce((sum, h) => sum + (h.ping || 0), 0) / data.heartbeats.filter(h => h.ping).length).toFixed(1)
        : 0;

      // Calculate downtime incidents
      let incidents = 0;
      let lastStatus = null;
      data?.heartbeats?.forEach(h => {
        if (lastStatus === 1 && h.status === 0) incidents++;
        lastStatus = h.status;
      });

      // Build uptime bar (last 24 hours, each segment = 30 minutes)
      const uptimeSegments = [];
      if (data?.heartbeats?.length > 0) {
        const now = new Date();
        const segments = 48; // 24 hours / 30 min = 48 segments
        for (let i = 0; i < segments; i++) {
          const segmentEnd = new Date(now - i * 30 * 60 * 1000);
          const segmentStart = new Date(segmentEnd - 30 * 60 * 1000);

          const segmentHeartbeats = data.heartbeats.filter(h => {
            const time = new Date(h.time);
            return time >= segmentStart && time < segmentEnd;
          });

          if (segmentHeartbeats.length === 0) {
            uptimeSegments.unshift({ status: 'unknown', time: segmentStart });
          } else {
            const anyDown = segmentHeartbeats.some(h => h.status === 0);
            uptimeSegments.unshift({ status: anyDown ? 'down' : 'up', time: segmentStart });
          }
        }
      }

      // Build response time chart
      const responseTimes = data?.heartbeats?.slice(0, 30).reverse() || [];

      document.getElementById('analytics-container').innerHTML = `
        <div class="analytics-overlay ${analyticsOpen ? 'open' : ''}" onclick="closeAnalytics()"></div>

            ${!loading && device.isRoom && data?.devices ? `
              <div class="analytics-status ${data.offlineCount === 0 ? 'up' : 'down'}">
                <span style="font-size: 10px;">●</span>
                ${data.onlineCount}/${data.totalCount} Online
              </div>
            ` : ''}
            ${!loading && data?.isPolyDevice ? `
              <div class="analytics-status ${data.connected ? 'up' : 'down'}">
                <span style="font-size: 10px;">●</span>
                ${data.connected ? 'Online' : 'Offline'}
              </div>
            ` : ''}

            <!-- Maintenance Mode Toggle (for monitors only, not rooms) -->
            ${!loading && !device.isRoom && !device.isPolyDevice && device.id ? `
              <div class="maintenance-toggle ${isInMaintenance(device.id) ? 'active' : ''}" onclick="showMaintenanceModal(${device.id}, '${device.name.replace(/'/g, "\\'")}', ${isInMaintenance(device.id) ? 'true' : 'false'})">
                <span>🔧</span>
                <span>${isInMaintenance(device.id) ? 'In Maintenance Mode' : 'Enable Maintenance Mode'}</span>
                ${isInMaintenance(device.id) ? '<span style="margin-left: auto; font-size: 12px; color: #F59E0B;">Click to disable</span>' : ''}
              </div>
            ` : ''}

            <!-- Maintenance Mode Toggle (for Poly devices) -->
            ${!loading && data?.isPolyDevice && data.polyDeviceId ? `
              <div class="maintenance-toggle ${isPolyInMaintenance(data.polyDeviceId) ? 'active' : ''}" onclick="showMaintenanceModal('${data.polyDeviceId}', '${device.name.replace(/'/g, "\\'")}', ${isPolyInMaintenance(data.polyDeviceId) ? 'true' : 'false'}, true)">

              </div>
            ` : ''}
          </div>

          <div class="analytics-content">

                      const height = h.ping ? Math.max(10, (h.ping / maxPing) * 100) : 5;
                      const slow = h.ping > 200;
                      const timeout = h.status === 0;
                      return `<div class="response-bar ${timeout ? 'timeout' : slow ? 'slow' : ''}"
                        style="height: ${timeout ? 100 : height}%;"
                        title="${h.ping ? h.ping + 'ms' : 'Timeout'} at ${new Date(h.time).toLocaleTimeString()}"></div>`;
                    }).join('')}
                  </div>
                </div>
              ` : ''}

              <div class="analytics-section">
                <div class="analytics-section-title">Recent History</div>
                <div class="history-list">
                  ${data.heartbeats.slice(0, 15).map(h => `
                    <div class="history-item">
                      <div class="history-status ${h.status === 1 ? 'up' : 'down'}"></div>
                      <div class="history-info">
                        <div class="history-time">${new Date(h.time).toLocaleString()}</div>
                        ${h.message ? `<div class="history-message">${h.message}</div>` : ''}
                      </div>
                      ${h.ping ? `<div class="history-ping">${h.ping}ms</div>` : ''}
                    </div>
                  `).join('')}
                </div>
              </div>
            `}
          </div>
        </div>
      `;
    }

    function render() {
      const floors = Object.keys(uptimeKumaData).length > 0
        ? Object.keys(uptimeKumaData)
        : ['1st Floor', '2nd Floor', '3rd Floor', '5th Floor'];

      const currentFloorData = uptimeKumaData[activeFloor] || { accessPoints: [], printers: [], polyLens: [] };
      const currentPolyData = polyLensData[activeFloor] || [];
      const currentCounts = getStatusCounts(currentFloorData, currentPolyData);
      const now = new Date().toLocaleTimeString();

      // Build device markers for floor plan
      let deviceMarkersHTML = '';
      let allDevices = [];

      // Add monitors from database (Access Points and Printers only - not polyLens type)
      Object.entries(currentFloorData).forEach(([type, devices]) => {
        if (Array.isArray(devices) && type !== 'polyLens') {
          devices.forEach(d => allDevices.push({ ...d, type, source: 'monitor' }));
        }
      });

      // Group Poly Lens devices by room
      const polyRoomGroups = {};
      currentPolyData.forEach(polyDevice => {
        const roomName = polyDevice.room || 'Unassigned';
        if (!polyRoomGroups[roomName]) {
          polyRoomGroups[roomName] = [];
        }
        polyRoomGroups[roomName].push(polyDevice);
      });

      // Add one marker per Poly Lens room
      Object.entries(polyRoomGroups).forEach(([roomName, devices]) => {
        const allConnected = devices.every(d => d.connected);
        const anyDisconnected = devices.some(d => !d.connected);
        allDevices.push({
          id: `room-${roomName.replace(/\s+/g, '-')}`,
          name: roomName,
          ip: devices.map(d => d.ip).filter(Boolean).join(', '),
          status: anyDisconnected ? 'down' : 'up',
          type: 'polyLens',
          source: 'polyLensRoom',
          roomDevices: devices,
          deviceCount: devices.length,
          pos_x: null,
          pos_y: null
        });
      });

      const positions = generatePositions(allDevices.length, activeFloor.charCodeAt(0) * 7);

      allDevices.forEach((device, idx) => {
        // Use saved position if available, otherwise use generated position
        let pos;
        const isRoomMarker = device.source === 'polyLensRoom';

        if (isRoomMarker) {
          // Check for saved room position
          const savedRoomPos = roomPositions[device.id];
          pos = savedRoomPos ? { x: savedRoomPos.pos_x, y: savedRoomPos.pos_y } : positions[idx];
        } else {
          // Check for saved monitor position
          const hasCustomPos = device.pos_x !== null && device.pos_y !== null;
          pos = hasCustomPos ? { x: device.pos_x, y: device.pos_y } : positions[idx];
        }

        const typeInfo = deviceTypes[device.type] || deviceTypes.polyLens;
        const status = statusColors[device.status] || statusColors.unknown;

        if (isRoomMarker) {
          // Room marker with multiple devices
          const roomDevices = device.roomDevices || [];
          const onlineCount = roomDevices.filter(d => d.connected).length;
          const offlineCount = roomDevices.length - onlineCount;

          deviceMarkersHTML += `
            <div class="device-marker" data-id="${device.id}" style="left: ${pos.x}%; top: ${pos.y}%;"
              ${editMode ? 'draggable="true" onmousedown="startDrag(event, this)"' : `onclick="openAnalytics('${device.id}', '${device.name.replace(/'/g, "\\'")}', 'polyLens', true)"`}
              oncontextmenu="showContextMenu(event, ${JSON.stringify({ id: device.id, name: device.name, status: offlineCount > 0 ? 'down' : 'up', type: 'polyLens' }).replace(/"/g, '&quot;')}, 'polyLensRoom')">
              ${offlineCount > 0 ? `<div class="device-ping" style="background: ${statusColors.down.pulse};"></div>` : ''}
              <div class="device-dot" style="background: ${status.bg}; border-color: ${typeInfo.color}; min-width: 28px; font-size: 9px;">
                ${roomDevices.length}
              </div>
              <div class="device-popup">
                <div class="popup-header">
                  <span class="popup-icon">🚪</span>
                  <span class="popup-name">${device.name}</span>
                </div>
                <div class="popup-details">
                  <div class="popup-row"><strong>Devices:</strong> <span>${roomDevices.length}</span></div>
                  <div class="popup-row">
                    <strong>Status:</strong>
                    <span class="status-badge" style="background: #22C55E;">${onlineCount} Online</span>
                    ${offlineCount > 0 ? `<span class="status-badge" style="background: #EF4444; margin-left: 4px;">${offlineCount} Offline</span>` : ''}
                  </div>
                </div>
                <div class="popup-section">
                  <div class="popup-section-title">📹 Devices in Room</div>
                  ${roomDevices.map(rd => `
                    <div class="popup-row" style="padding: 6px 0; border-bottom: 1px solid rgba(148,163,184,0.1);">
                      <div style="display: flex; align-items: center; gap: 6px;">
                        <span style="color: ${rd.connected ? '#22C55E' : '#EF4444'};">●</span>
                        <strong>${rd.name}</strong>
                      </div>
                      <div style="margin-left: 16px; font-size: 11px; color: #94A3B8;">
                        <span>${rd.hardwareModel || 'Unknown model'}</span>
                        ${rd.ip ? `<span style="margin-left: 8px; color: #60A5FA;">IP: ${rd.ip}</span>` : ''}

                    </div>
                  `).join('')}
                </div>
                <div class="popup-arrow"></div>
              </div>
            </div>
          `;
        } else {
          // Regular device marker (AP, Printer)
          const polyDevice = currentPolyData.find(p => p.ip === device.ip);
          const inMaintenance = isInMaintenance(device.id);
          const maintenanceInfo = getMaintenanceInfo(device.id);

          deviceMarkersHTML += `
            <div class="device-marker ${inMaintenance ? 'maintenance' : ''}" data-id="${device.id}" style="left: ${pos.x}%; top: ${pos.y}%;"

              oncontextmenu="showContextMenu(event, ${JSON.stringify({ id: device.id, name: device.name, hostname: device.ip, ip: device.ip, url: device.url, status: device.status, type: device.type, maintenance: inMaintenance }).replace(/"/g, '&quot;')}, '${device.type}')">

                  <span class="popup-name">${device.name}</span>

                  <div class="popup-row">
                    <strong>Status:</strong>
                    <span class="status-badge" style="background: ${inMaintenance ? '#F59E0B' : status.bg};">${inMaintenance ? 'Maintenance' : status.label}</span>

                    <div class="popup-row"><strong>Model:</strong> <span>${polyDevice.hardwareModel || 'N/A'}</span></div>

      let sidebarHTML = '';

                    <div class="device-name">${device.name}</div>
                    <div class="device-meta">

                    </div>
                  </div>
                </div>

            </div>

      // Poly Lens / Zoom Rooms section - grouped by room
      const polyRooms = getPolyLensRooms(activeFloor);
      const roomNames = Object.keys(polyRooms).sort();

      if (roomNames.length > 0) {
        const totalPolyDevices = currentPolyData.length;
        const onlinePolyDevices = currentPolyData.filter(d => d.connected).length;

        sidebarHTML += `
          <div class="device-category">
            <div class="category-header poly collapsed" onclick="toggleCategory(this)">
              <span>📹</span>
              <span class="category-name">Zoom Rooms</span>
              <span class="category-count">${onlinePolyDevices}/${totalPolyDevices}</span>
              <span class="collapse-icon">▼</span>
            </div>
            <div class="category-content collapsed">
              ${roomNames.map(roomName => {
                const roomDevices = polyRooms[roomName];
                const allOnline = roomDevices.every(d => d.connected);
                const anyOffline = roomDevices.some(d => !d.connected);
                const onlineInRoom = roomDevices.filter(d => d.connected).length;

                const roomId = 'room-' + roomName.replace(/\s+/g, '-');
                return `
                  <div class="room-group">
                    <div class="room-header collapsed" onclick="toggleRoom(event, this, '${roomId}')">
                      <div class="room-status ${anyOffline ? 'down' : 'up'}"></div>
                      <span class="room-name">${roomName}</span>
                      <span style="font-size: 11px; color: #64748B;">${onlineInRoom}/${roomDevices.length}</span>
                      <span class="collapse-icon">▼</span>
                    </div>
                    <div class="room-devices collapsed">
                      ${roomDevices.map(device => `
                        <div class="device-item clickable ${!device.connected ? 'down' : ''}" onclick="event.stopPropagation(); highlightDevice('${roomId}'); openAnalytics('${roomId}', '${roomName.replace(/'/g, "\\'")}', 'polyLens', true)">
                          <div class="device-status-dot ${device.connected ? 'up' : 'down'}"></div>
                          <div class="device-info">
                            <div class="device-name">${device.name}</div>
                            <div class="device-meta">
                              <span class="device-model">${device.hardwareModel || 'Unknown'}</span>
                              <span>${device.ip || 'No IP'}</span>
                            </div>
                          </div>
                        </div>
                      `).join('')}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      // Maintenance Mode section - filter by current floor
      const floorMaintenanceDevices = [
        ...maintenanceDevices.filter(d => d.floor === activeFloor),
        ...maintenancePolyDevices.filter(d => d.floor === activeFloor).map(d => ({
          ...d,
          id: d.device_id,
          name: d.name,
          floor: d.floor,
          isPoly: true
        }))
      ];

      if (floorMaintenanceDevices.length > 0) {
        sidebarHTML += `
          <div class="device-category">
            <div class="category-header maintenance" onclick="toggleCategory(this)">
              <span>🔧</span>
              <span class="category-name">Maintenance</span>
              <span class="category-count">${floorMaintenanceDevices.length}</span>
              <span class="collapse-icon">▼</span>
            </div>
            <div class="category-content">
              ${floorMaintenanceDevices.map(device => `
                <div class="device-item maintenance clickable" onclick="event.stopPropagation(); ${device.isPoly ? `showMaintenanceModal('${device.device_id}', '${(device.name || '').replace(/'/g, "\\'")}', true, true)` : `showMaintenanceModal(${device.id}, '${(device.name || '').replace(/'/g, "\\'")}', true, false)`}">
                  <div class="device-status-dot maintenance"></div>
                  <div class="device-info">
                    <div class="device-name">${device.name || 'Unknown Device'}</div>
                    <div class="device-meta">
                      <span>${device.floor || 'Unknown Floor'}</span>
                      <span>${device.isPoly ? '📹 Zoom Room' : device.device_type === 'printers' ? '🖨️ Printer' : '📡 AP'}</span>
                    </div>
                    ${device.maintenance_note ? `<div class="device-meta" style="color: #F59E0B; margin-top: 2px;">${device.maintenance_note}</div>` : ''}
                    ${device.maintenance_until ? `<div class="device-meta" style="color: #94A3B8; margin-top: 2px;">Until: ${new Date(device.maintenance_until).toLocaleString()}</div>` : ''}
                  </div>
                  <div style="margin-left: auto; font-size: 10px; color: #F59E0B; padding: 2px 6px; background: rgba(245, 158, 11, 0.2); border-radius: 4px;">
                    Click to disable
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Get summary statistics
      const summaryStats = getSummaryStats();
      const floorHealth = getFloorHealthStatus(currentFloorData, currentPolyData);

      // Check for alerts on new failures
      const allDevicesForAlert = [...allDevices];
      currentPolyData.forEach(d => allDevicesForAlert.push({ id: d.id, name: d.name, connected: d.connected }));
      checkForAlerts(allDevicesForAlert);

      // Render the page
      document.getElementById('app').innerHTML = `
        <header class="header">
          <div>
            <h1 class="title">🏢 Office Infrastructure Monitor</h1>
            <p class="subtitle">Last updated: ${now}</p>
            <div class="data-sources">
              <div class="data-source ${apiStatus.uptimeKuma.connected ? 'connected' : 'disconnected'}">
                <span style="color: ${apiStatus.uptimeKuma.connected ? '#22C55E' : '#EF4444'};">●</span>
                Monitors (${apiStatus.uptimeKuma.monitorCount})
              </div>
              <div class="data-source ${apiStatus.polyLens.configured ? 'connected' : 'disconnected'}">
                <span style="color: ${apiStatus.polyLens.configured ? '#22C55E' : '#EF4444'};">●</span>
                Poly Lens (${apiStatus.polyLens.deviceCount})
              </div>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
            <!-- Search Bar -->
            <div class="search-container">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" class="search-input" placeholder="Search devices..." oninput="handleSearch(this.value)" onfocus="if(this.value) handleSearch(this.value)">
              <span class="search-shortcut">/</span>
              <div id="search-results" class="search-results"></div>
            </div>

            <!-- Control Buttons -->
            <div class="control-buttons">
              <button class="control-btn ${!darkMode ? 'active' : ''}" onclick="toggleDarkMode()" title="Toggle Light/Dark Mode (D)">
                ${darkMode ? '☀️' : '🌙'}
              </button>
              <button class="control-btn ${soundEnabled ? '' : 'muted'}" onclick="toggleSound()" title="Toggle Sound Alerts (M)">
                ${soundEnabled ? '🔔' : '🔕'}
              </button>
              <button class="control-btn" onclick="toggleKioskMode()" title="Fullscreen/Kiosk Mode (F)">
                📺
              </button>
              <button class="control-btn" onclick="toggleShortcutsModal()" title="Keyboard Shortcuts (?)">
                ⌨️
              </button>
              <button class="control-btn ${locationEnabled ? 'active' : ''}" onclick="toggleLocation()" title="My Location (L)" style="${locationEnabled ? 'background: rgba(59, 130, 246, 0.3); border-color: #3B82F6;' : ''}">
                📍
              </button>
              <div class="notification-btn-wrapper">
                <button class="control-btn" onclick="toggleNotificationDropdown()" title="Notifications (N)">
                  🔔
                </button>
                ${notificationUnreadCount > 0 ? `<span class="notification-badge">${notificationUnreadCount > 99 ? '99+' : notificationUnreadCount}</span>` : ''}
                ${renderNotificationDropdown()}
              </div>
              <button class="control-btn" onclick="toggleLanguage()" title="Toggle Language (עברית/English)">
                ${currentLang === 'he' ? 'EN' : 'עב'}
              </button>
            </div>

            <div class="status-cards">
              <div class="status-card online">
                <div class="status-number online">${currentCounts.up}</div>
                <div class="status-label">Online</div>
              </div>
              <div class="status-card offline">
                <div class="status-number offline">${currentCounts.down}</div>
                <div class="status-label">Offline</div>
              </div>
            </div>
            <div class="header-actions">
              ${editMode ? `
                <button class="header-btn" onclick="savePositionChanges()" style="background: rgba(34, 197, 94, 0.3); border-color: #22C55E; color: #22C55E;">
                  💾 Save<span id="pending-count">${getPendingCount() > 0 ? ` (${getPendingCount()})` : ''}</span>
                </button>
                <button class="header-btn" onclick="cancelPositionChanges()" style="background: rgba(239, 68, 68, 0.2); border-color: #EF4444; color: #EF4444;">
                  ✕ Cancel
                </button>
              ` : `
                <button class="header-btn" onclick="toggleEditMode()">
                  ✏️ Edit Mode
                </button>
              `}
              <button class="header-btn" onclick="toggleAdmin()">
                ⚙️ Settings${isAdmin() && pendingChangesCount > 0 ? `<span class="pending-badge">${pendingChangesCount}</span>` : ''}
              </button>

                <span>👤 ${currentUser?.username || 'Guest'}</span>

          </div>
          ${maintenanceDevices.length > 0 ? `
            <div class="summary-card warning">
              <span class="summary-card-icon">🔧</span>
              <div class="summary-card-content">
                <span class="summary-card-value">${maintenanceDevices.length}</span>
                <span class="summary-card-label">Maintenance</span>

          <div style="margin-left: auto;">
            <button class="control-btn ${widgetsEnabled ? 'active' : ''}" onclick="toggleWidgets()" title="Toggle Widgets" style="${widgetsEnabled ? 'background: rgba(139, 92, 246, 0.3); border-color: #8B5CF6;' : ''}">

        <!-- Threshold Alerts Bar -->
        ${thresholdAlerts.length > 0 ? `
          <div class="alerts-bar ${thresholdAlerts.some(a => a.alert_value <= 10) ? '' : 'warning'}">
            <span style="font-weight: 600; margin-right: 8px;">
              ${thresholdAlerts.some(a => a.alert_value <= 10) ? '🚨' : '⚠️'} Supply Alerts:

            ${thresholdAlerts.slice(0, 5).map(alert => `

                  <span class="alert-icon">${alert.alert_type.includes('toner') ? '🖨️' : '📄'}</span>
                  <span class="alert-text">${alert.monitor_name}</span>
                  <span class="alert-value ${alert.alert_value > 10 ? 'warning' : ''}">${alert.alert_type.replace('_', ' ')}: ${alert.alert_value}%</span>
                </div>
                <button onclick="event.stopPropagation(); dismissAlert(${alert.id})" title="Dismiss this alert" style="background: none; border: none; color: #94A3B8; cursor: pointer; padding: 2px 6px; margin-left: 4px; font-size: 14px; opacity: 0.7; transition: opacity 0.2s;" onmouseover="this.style.opacity=1; this.style.color='#EF4444'" onmouseout="this.style.opacity=0.7; this.style.color='#94A3B8'">✕</button>
              </div>
            `).join('')}
            ${thresholdAlerts.length > 5 ? `<span style="color: #94A3B8; font-size: 12px;">+${thresholdAlerts.length - 5} more</span>` : ''}
            <button onclick="dismissAllAlerts()" title="Dismiss all alerts" style="background: rgba(148, 163, 184, 0.2); border: 1px solid rgba(148, 163, 184, 0.3); color: #94A3B8; cursor: pointer; padding: 4px 10px; margin-left: 12px; font-size: 11px; border-radius: 4px; transition: all 0.2s;" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'; this.style.borderColor='#EF4444'; this.style.color='#FCA5A5'" onmouseout="this.style.background='rgba(148, 163, 184, 0.2)'; this.style.borderColor='rgba(148, 163, 184, 0.3)'; this.style.color='#94A3B8'">Dismiss All</button>
          </div>
        ` : ''}

        <!-- Kiosk Exit Button -->
        <button class="kiosk-exit" onclick="toggleKioskMode()">✕ Exit Fullscreen</button>

        <div class="floor-tabs">
          ${floors.map(floor => {
            const floorData = uptimeKumaData[floor] || { accessPoints: [], printers: [], polyLens: [] };
            const polyFloor = polyLensData[floor] || [];
            const counts = getStatusCounts(floorData, polyFloor);
            const isActive = floor === activeFloor && currentView === 'floors';
            const hasIssues = counts.down > 0 || polyFloor.some(d => !d.connected);

            return `
              <button class="floor-tab ${isActive ? 'active' : ''}" onclick="setView('floors'); setFloor('${floor}')">
                <div class="floor-tab-content">
                  ${floor}
                  ${hasIssues ? '<span class="issue-dot"></span>' : ''}
                </div>
                <div class="floor-tab-count">${counts.total + polyFloor.length} devices</div>
              </button>
            `;
          }).join('')}
          <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="floor-tab ${currentView === 'activity' ? 'active' : ''}" onclick="setView('activity')" style="background: ${currentView === 'activity' ? 'rgba(139, 92, 246, 0.3)' : ''}; border-color: ${currentView === 'activity' ? '#8B5CF6' : ''};">
              <div class="floor-tab-content">📋 Activity</div>
            </button>
            <button class="floor-tab ${currentView === 'incidents' ? 'active' : ''}" onclick="setView('incidents')" style="background: ${currentView === 'incidents' ? 'rgba(239, 68, 68, 0.3)' : ''}; border-color: ${currentView === 'incidents' ? '#EF4444' : ''};">
              <div class="floor-tab-content">⚠️ Incidents${incidents.filter(i => !i.ended_at).length > 0 ? ` (${incidents.filter(i => !i.ended_at).length})` : ''}</div>
            </button>
          </div>
        </div>

        ${currentView === 'activity' ? renderActivityLogView() : currentView === 'incidents' ? renderIncidentHistoryView() : `
        <div class="main-content ${editMode ? 'edit-mode' : ''} ${locationMode ? 'location-mode' : ''}">
          <div class="floor-plan-container" onclick="handleMapClick(event, this)" style="${floorPlans[activeFloor]?.image_data ? `background: url('data:image/${floorPlans[activeFloor].image_type};base64,${floorPlans[activeFloor].image_data}') center/contain no-repeat;` : ''}">
            <!-- Heat Map Overlay -->
            <div class="heat-map-overlay ${floorHealth}"></div>
            ${!floorPlans[activeFloor]?.image_data ? `
              <div class="floor-plan-placeholder">
                <div class="placeholder-content">
                  <div class="placeholder-icon">🗺️</div>
                  <div class="placeholder-title">${activeFloor} Blueprint</div>
                  <div class="placeholder-subtitle">${editMode ? 'Go to Settings → Floor Plans to upload' : 'Upload floor plan in Settings'}</div>
                </div>
              </div>
            ` : ''}
            ${deviceMarkersHTML}
            ${renderUserLocationMarker()}
            ${locationMode ? '<div style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(59, 130, 246, 0.9); color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px; z-index: 100;">👆 Click anywhere to set your location</div>' : ''}
          </div>

          <div class="sidebar">
            <h3 class="sidebar-title">📋 ${activeFloor} Devices</h3>
            ${sidebarHTML || '<p style="color: #64748B; text-align: center; padding: 20px;">No devices found</p>'}
          </div>
        </div>

        <div class="legend">
          <div class="legend-item">
            <span class="legend-icon">📡</span>
            <span class="legend-text ap">Access Points</span>
          </div>
          <div class="legend-item">
            <span class="legend-icon">🖨️</span>
            <span class="legend-text printer">Printers</span>
          </div>
          <div class="legend-item">
            <span class="legend-icon">📹</span>
            <span class="legend-text poly">Zoom Rooms</span>
          </div>
          ${locationEnabled ? `
          <div class="legend-item">
            <span class="legend-icon">📍</span>
            <span class="legend-text" style="color: #3B82F6;">Your Location</span>
          </div>
          ` : ''}
          <div style="margin-left: 24px; display: flex; gap: 16px;">
            <div class="legend-item">
              <div class="legend-dot" style="background: #22C55E;"></div>
              <span class="legend-text status">Online</span>
            </div>
            <div class="legend-item">
              <div class="legend-dot" style="background: #EF4444;"></div>
              <span class="legend-text status">Offline</span>
            </div>
          </div>
        </div>
        `}
      `;
    }

    function setFloor(floor) {
      activeFloor = floor;
      render();
    }

    // Render the main app (after login)
    async function renderApp() {
      if (!authToken || !currentUser) {
        renderLogin();
        return;
      }

      await fetchAllData();
      await fetchFloorPlans();
      await fetchCustomDeviceTypes();
      await fetchRecentIncidents();
      if (isAdmin()) {
        await fetchPendingChangesCount();
      }

      // Initialize WebSocket for real-time updates
      initWebSocket();

      render();
    }

    // Initial check
    async function init() {
      if (authToken && currentUser) {
        // Verify token is still valid
        try {
          const response = await authFetch(`${API_URL}/api/auth/me`);
          if (!response.ok) {
            // Token expired
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            localStorage.removeItem('currentUser');
          }
        } catch (e) {
          // Server unavailable, keep trying with stored credentials
        }
      }

      if (authToken && currentUser) {
        await renderApp();
      } else {
        renderLogin();
      }
    }
    init();

    // Auto-refresh every 30 seconds (only when logged in)
    setInterval(async () => {
      if (authToken && currentUser) {
        await fetchAllData();
        if (isAdmin()) {
          await fetchPendingChangesCount();
        }
        render();
      }
    }, 30000);
  </script>

  <!-- Admin Panel Overlay -->
  <div id="admin-overlay" class="admin-overlay" onclick="toggleAdmin()"></div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="admin-panel">
    <div class="admin-header">
      <h2 class="admin-title">⚙️ Settings</h2>
      <button class="admin-close" onclick="toggleAdmin()">&times;</button>
    </div>
    <div id="admin-tabs-container" class="admin-tabs"></div>
    <div id="admin-content" class="admin-content"></div>
  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <script>
    // Update admin tab styling
    function updateAdminTabs() {
      document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.tab === adminTab);
      });
    }

    // Override setAdminTab to also update tab styling
    const originalSetAdminTab = setAdminTab;
    setAdminTab = function(tab) {
      adminTab = tab;
      updateAdminTabs();
      renderAdmin();
    };

    // Drag and drop functionality for edit mode
    let isDragging = false;
    let currentDragElement = null;
    let dragStartX = 0;
    let dragStartY = 0;
    let elementStartX = 0;
    let elementStartY = 0;

    function startDrag(e, element) {
      if (!editMode) return;
      e.preventDefault();

      isDragging = true;
      currentDragElement = element;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      elementStartX = parseFloat(element.style.left);
      elementStartY = parseFloat(element.style.top);

      element.style.zIndex = '1000';
      element.style.cursor = 'grabbing';

      document.addEventListener('mousemove', onDrag);
      document.addEventListener('mouseup', endDrag);
    }

    function onDrag(e) {
      if (!isDragging || !currentDragElement) return;

      const container = document.querySelector('.floor-plan-container');
      const rect = container.getBoundingClientRect();

      const deltaX = ((e.clientX - dragStartX) / rect.width) * 100;
      const deltaY = ((e.clientY - dragStartY) / rect.height) * 100;

      let newX = elementStartX + deltaX;
      let newY = elementStartY + deltaY;

      // Constrain to container bounds
      newX = Math.max(0, Math.min(100, newX));
      newY = Math.max(0, Math.min(100, newY));

      currentDragElement.style.left = `${newX}%`;
      currentDragElement.style.top = `${newY}%`;
    }

    function endDrag(e) {
      if (!isDragging || !currentDragElement) return;

      document.removeEventListener('mousemove', onDrag);
      document.removeEventListener('mouseup', endDrag);

      const deviceId = currentDragElement.dataset.id;
      const newX = parseFloat(currentDragElement.style.left);
      const newY = parseFloat(currentDragElement.style.top);

      currentDragElement.style.zIndex = '';
      currentDragElement.style.cursor = '';

      // Store position in pending changes (don't save to database yet)
      if (deviceId) {
        const isRoom = deviceId.startsWith('room-');
        pendingPositions[deviceId] = { x: newX, y: newY, isRoom, floor: activeFloor };
        console.log(`Position queued for ${isRoom ? 'room' : 'device'} ${deviceId}: ${newX}%, ${newY}%`);
        // Update the save button count
        updateEditModeButtons();
      }

      isDragging = false;
      currentDragElement = null;
    }

    function updateEditModeButtons() {
      const countEl = document.getElementById('pending-count');
      if (countEl) {
        const count = getPendingCount();
        countEl.textContent = count > 0 ? ` (${count})` : '';
      }
    }

    // Toggle category collapse (Access Points, Printers, Zoom Rooms)
    function toggleCategory(header) {
      header.classList.toggle('collapsed');
      const content = header.nextElementSibling;
      if (content) {
        content.classList.toggle('collapsed');
      }
    }

    // Toggle room collapse and optionally highlight on map
    function toggleRoom(event, header, roomId) {
      event.stopPropagation();

      // If clicking on the room name area, highlight on map
      const clickedOnName = event.target.classList.contains('room-name') ||
                           event.target.classList.contains('room-status');

      if (clickedOnName) {
        highlightDevice(roomId);
      } else {
        // Toggle collapse
        header.classList.toggle('collapsed');
        const devices = header.nextElementSibling;
        if (devices) {
          devices.classList.toggle('collapsed');
        }
      }
    }

    // Highlight device on map when clicked from sidebar
    function highlightDevice(deviceId) {
      // Remove previous highlight
      document.querySelectorAll('.device-marker.highlighted').forEach(el => {
        el.classList.remove('highlighted');
      });

      // Find and highlight the marker
      const marker = document.querySelector(`.device-marker[data-id="${deviceId}"]`);
      if (marker) {
        marker.classList.add('highlighted');

        // Scroll the marker into view
        marker.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });

        // Remove highlight after 5 seconds
        setTimeout(() => {
          marker.classList.remove('highlighted');
        }, 5000);
      } else {
        console.log('Device not found on map:', deviceId);
      }
    }

    // Smart popup positioning - show below if not enough space above
    document.addEventListener('mouseenter', function(e) {
      const marker = e.target.closest('.device-marker');
      if (!marker) return;

      const popup = marker.querySelector('.device-popup');
      if (!popup) return;

      // Reset position first
      popup.classList.remove('below');

      // Get container bounds
      const container = marker.closest('.floor-plan-container');
      if (!container) return;

      const containerRect = container.getBoundingClientRect();
      const markerRect = marker.getBoundingClientRect();

      // Calculate space above marker relative to container top
      const spaceAbove = markerRect.top - containerRect.top;
      const popupHeight = 250; // Approximate popup height

      // If not enough space above, show below
      if (spaceAbove < popupHeight) {
        popup.classList.add('below');
      }
    }, true);
  </script>
</body>
</html>
