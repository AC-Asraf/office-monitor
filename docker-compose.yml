services:
  office-monitor:
    build: .
    image: office-monitor:latest
    container_name: office-monitor
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3002"
    volumes:
      # Persist database and logs
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount .env file for configuration
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_PATH=/app/data/monitor.db
    # Resource limits for stability
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    # Log rotation to prevent disk filling up
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - office-monitor-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Optional: Auto-update service
  # Uncomment to enable automatic updates when new images are available
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - WATCHTOWER_CLEANUP=true
  #     - WATCHTOWER_POLL_INTERVAL=86400  # Check every 24 hours
  #     - WATCHTOWER_LABEL_ENABLE=true    # Only update labeled containers
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "5m"
  #       max-file: "2"
  #   networks:
  #     - office-monitor-net

networks:
  office-monitor-net:
    driver: bridge
