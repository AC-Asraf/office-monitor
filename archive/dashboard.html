<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Office Monitor">
  <meta name="theme-color" content="#0F172A">
  <meta name="description" content="Real-time monitoring dashboard for office infrastructure">
  <link rel="manifest" href="http://localhost:3002/manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230F172A' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='%233B82F6'>🖥️</text></svg>">
  <title>Office Infrastructure Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      color: #F8FAFC;
      padding: 24px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes ping {
      75%, 100% {
        transform: translate(-50%, -50%) scale(2);
        opacity: 0;
      }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .title {
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(90deg, #60A5FA, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 4px;
      color: #94A3B8;
      font-size: 14px;
    }

    .data-sources {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .data-source {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(51, 65, 85, 0.5);
    }

    .data-source.connected { border-left: 2px solid #22C55E; }
    .data-source.disconnected { border-left: 2px solid #EF4444; }

    .status-cards {
      display: flex;
      gap: 12px;
    }

    .status-card {
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
    }

    .status-card.online {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .status-card.offline {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .status-card.poly {
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .status-number {
      font-size: 24px;
      font-weight: 700;
    }

    .status-number.online { color: #22C55E; }
    .status-number.offline { color: #EF4444; }
    .status-number.poly { color: #F59E0B; }

    .status-label {
      font-size: 12px;
      color: #94A3B8;
    }

    .floor-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .floor-tab {
      flex: 1;
      padding: 16px 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(30, 41, 59, 0.8);
      color: #94A3B8;
      font-size: 16px;
      font-weight: 500;
      font-family: inherit;
    }

    .floor-tab:hover {
      background: rgba(51, 65, 85, 0.8);
    }

    .floor-tab.active {
      background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
      color: #FFFFFF;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
    }

    .floor-tab-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .issue-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #EF4444;
      animation: pulse 2s infinite;
    }

    .floor-tab-count {
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.8;
    }

    .main-content {
      display: flex;
      gap: 24px;
    }

    .floor-plan-container {
      flex: 1;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 16px;
      padding: 0;
      position: relative;
      min-height: 600px;
      height: calc(100vh - 300px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      overflow: visible;
    }

    .floor-plan-placeholder {
      position: absolute;
      inset: 24px;
      background: linear-gradient(180deg, rgba(51, 65, 85, 0.3) 0%, rgba(30, 41, 59, 0.5) 100%);
      border-radius: 12px;
      border: 2px dashed rgba(148, 163, 184, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder-content {
      text-align: center;
      color: #64748B;
    }

    .placeholder-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .placeholder-title {
      font-size: 18px;
      font-weight: 500;
    }

    .placeholder-subtitle {
      font-size: 14px;
      margin-top: 4px;
    }

    .device-marker {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 10;
      cursor: pointer;
    }

    .device-marker:hover {
      z-index: 100;
    }

    .device-ping {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      opacity: 0.4;
      animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
      transform: translate(-50%, -50%);
      left: 50%;
      top: 50%;
    }

    .device-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: all 0.2s ease;
      border-width: 3px;
      border-style: solid;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .device-marker:hover .device-dot {
      width: 28px;
      height: 28px;
    }

    /* User Location Marker */
    .user-location-marker {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 200;
      pointer-events: none;
    }

    .user-location-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #3B82F6;
      border: 4px solid white;
      box-shadow: 0 2px 10px rgba(59, 130, 246, 0.5), 0 0 0 2px rgba(59, 130, 246, 0.3);
      position: relative;
    }

    .user-location-pulse {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.2);
      transform: translate(-50%, -50%);
      left: 50%;
      top: 50%;
      animation: locationPulse 2s ease-out infinite;
    }

    .user-location-accuracy {
      position: absolute;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      transform: translate(-50%, -50%);
      left: 50%;
      top: 50%;
    }

    .user-location-label {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 8px;
      background: rgba(59, 130, 246, 0.9);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
    }

    @keyframes locationPulse {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(2);
        opacity: 0;
      }
    }

    /* Location mode cursor */
    .location-mode .floor-plan-container {
      cursor: crosshair;
    }

    .location-mode .floor-image {
      cursor: crosshair;
    }

    .device-popup {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 12px;
      background: linear-gradient(135deg, #1E293B 0%, #334155 100%);
      border-radius: 12px;
      padding: 16px;
      min-width: 260px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(148, 163, 184, 0.2);
      z-index: 1000;
      display: none;
      pointer-events: none;
    }

    .device-popup.below {
      bottom: auto;
      top: 100%;
      margin-bottom: 0;
      margin-top: 12px;
    }

    .device-popup.below .popup-arrow {
      bottom: auto;
      top: -8px;
      border-top: none;
      border-bottom: 8px solid #334155;
    }

    .device-marker:hover .device-popup {
      display: block;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .popup-icon {
      font-size: 20px;
    }

    .popup-name {
      font-weight: 600;
      font-size: 14px;
    }

    .popup-details {
      font-size: 13px;
      color: #94A3B8;
    }

    .popup-row {
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .popup-row strong {
      color: #CBD5E1;
    }

    .popup-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-badge {
      color: #FFF;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .popup-arrow {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #334155;
    }

    .popup-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
    }

    .popup-section-title {
      font-size: 11px;
      color: #F59E0B;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sidebar {
      width: 380px;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(148, 163, 184, 0.1);
      max-height: 650px;
      overflow-y: auto;
    }

    .sidebar-title {
      margin-bottom: 16px;
      font-size: 16px;
      color: #E2E8F0;
    }

    .device-category {
      margin-bottom: 20px;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      border-left: 3px solid;
      cursor: pointer;
      transition: background 0.2s;
    }

    .category-header:hover {
      filter: brightness(1.2);
    }

    .category-header .collapse-icon {
      margin-left: auto;
      transition: transform 0.2s;
      font-size: 12px;
      color: #64748B;
    }

    .category-header.collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    .category-content {
      max-height: 1000px;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .category-content.collapsed {
      max-height: 0;
    }

    .category-header.ap { background: rgba(59, 130, 246, 0.13); border-color: #3B82F6; }
    .category-header.printer { background: rgba(139, 92, 246, 0.13); border-color: #8B5CF6; }
    .category-header.poly { background: rgba(245, 158, 11, 0.13); border-color: #F59E0B; }
    .category-header.maintenance { background: rgba(245, 158, 11, 0.2); border-color: #F59E0B; border-style: dashed; }

    .category-name {
      font-weight: 600;
      font-size: 14px;
    }

    .category-count {
      margin-left: auto;
      background: rgba(0,0,0,0.2);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .room-group {
      margin-bottom: 12px;
      background: rgba(30, 41, 59, 0.4);
      border-radius: 8px;
      overflow: hidden;
    }

    .room-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(245, 158, 11, 0.1);
      border-bottom: 1px solid rgba(245, 158, 11, 0.2);
      cursor: pointer;
    }

    .room-header:hover {
      background: rgba(245, 158, 11, 0.15);
    }

    .room-header .collapse-icon {
      margin-left: auto;
      transition: transform 0.2s;
      font-size: 10px;
      color: #64748B;
    }

    .room-header.collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    .room-name {
      font-weight: 500;
      font-size: 13px;
      flex: 1;
    }

    .room-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .room-status.up { background: #22C55E; }
    .room-status.down { background: #EF4444; box-shadow: 0 0 8px #EF4444; }

    .room-devices {
      padding: 8px;
      max-height: 500px;
      overflow: hidden;
      transition: max-height 0.3s ease-out, padding 0.3s ease-out;
    }

    .room-devices.collapsed {
      max-height: 0;
      padding: 0 8px;
    }

    .device-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 4px;
      background: rgba(51, 65, 85, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .device-item:hover {
      background: rgba(51, 65, 85, 0.5);
    }

    .device-item.down {
      background: rgba(239, 68, 68, 0.1);
    }

    .device-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .device-status-dot.up { background: #22C55E; }
    .device-status-dot.down { background: #EF4444; box-shadow: 0 0 8px #EF4444; }
    .device-status-dot.maintenance { background: #F59E0B; }

    .device-info {
      flex: 1;
      min-width: 0;
    }

    .device-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .device-meta {
      font-size: 11px;
      color: #64748B;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .device-model {
      color: #F59E0B;
      font-weight: 500;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 24px;
      padding: 16px;
      background: rgba(30, 41, 59, 0.4);
      border-radius: 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-icon {
      font-size: 16px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .legend-text {
      font-size: 14px;
    }

    .legend-text.ap { color: #3B82F6; }
    .legend-text.printer { color: #8B5CF6; }
    .legend-text.poly { color: #F59E0B; }
    .legend-text.status { color: #94A3B8; font-size: 13px; }

    /* ==================== ADMIN PANEL ==================== */

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(51, 65, 85, 0.5);
      color: #F8FAFC;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btn:hover {
      background: rgba(71, 85, 105, 0.7);
      border-color: rgba(148, 163, 184, 0.5);
    }

    .header-btn.active {
      background: rgba(59, 130, 246, 0.3);
      border-color: #3B82F6;
      color: #60A5FA;
    }

    .admin-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .admin-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .admin-panel {
      position: fixed;
      top: 0;
      right: -500px;
      width: 500px;
      height: 100vh;
      background: #1E293B;
      border-left: 1px solid rgba(148, 163, 184, 0.2);
      z-index: 1000;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .admin-panel.open {
      right: 0;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .admin-title {
      font-size: 20px;
      font-weight: 600;
    }

    .admin-close {
      background: none;
      border: none;
      color: #94A3B8;
      font-size: 24px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .admin-close:hover {
      color: #F8FAFC;
    }

    .admin-tabs {
      display: flex;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .admin-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 13px;
      color: #94A3B8;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .admin-tab:hover {
      color: #F8FAFC;
      background: rgba(51, 65, 85, 0.5);
    }

    .admin-tab.active {
      color: #60A5FA;
      border-bottom-color: #3B82F6;
    }

    .admin-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .admin-section {
      margin-bottom: 24px;
    }

    .admin-section-title {
      font-size: 14px;
      font-weight: 600;
      color: #94A3B8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 6px;
    }

    .form-input, .form-select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.5);
      color: #F8FAFC;
      font-size: 14px;
    }

    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: #3B82F6;
    }

    .form-input::placeholder {
      color: #64748B;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: #3B82F6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563EB;
    }

    .btn-secondary {
      background: rgba(51, 65, 85, 0.7);
      color: #F8FAFC;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(71, 85, 105, 0.7);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      color: #EF4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* Device List in Admin */
    .device-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .device-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .device-item:hover {
      border-color: rgba(148, 163, 184, 0.3);
    }

    .device-info {
      flex: 1;
    }

    .device-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .device-meta {
      font-size: 12px;
      color: #64748B;
    }

    .device-actions {
      display: flex;
      gap: 6px;
    }

    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #475569;
      border-radius: 22px;
      transition: 0.3s;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: #22C55E;
    }

    .toggle-switch input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }

    /* Floor Plan Upload */
    .floor-plan-upload {
      border: 2px dashed rgba(148, 163, 184, 0.3);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .floor-plan-upload:hover {
      border-color: #3B82F6;
      background: rgba(59, 130, 246, 0.05);
    }

    .floor-plan-upload.has-image {
      padding: 12px;
    }

    .floor-plan-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 4px;
    }

    .upload-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .upload-text {
      color: #94A3B8;
      font-size: 14px;
    }

    /* Edit Mode Styles */
    .edit-mode .device-marker {
      cursor: move !important;
    }

    .edit-mode .device-marker::after {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border: 2px dashed #3B82F6;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .edit-mode .floor-plan-container {
      border: 2px dashed #3B82F6;
    }

    /* Highlighted device marker */
    .device-marker.highlighted {
      z-index: 500 !important;
    }

    .device-marker.highlighted .device-dot {
      transform: scale(1.5);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.8), 0 0 40px rgba(59, 130, 246, 0.4);
    }

    .device-marker.highlighted .device-popup {
      display: block !important;
    }

    @keyframes bounce {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.3); }
    }

    .device-marker.highlighted {
      animation: bounce 0.5s ease-in-out 3;
    }

    /* Clickable sidebar items */
    .device-item.clickable {
      cursor: pointer;
    }

    .device-item.clickable:hover {
      background: rgba(59, 130, 246, 0.2);
      border-left: 3px solid #3B82F6;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .modal.open {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: #1E293B;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #22C55E;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
    }

    /* Search/Filter */
    .search-box {
      position: relative;
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.5);
      color: #F8FAFC;
      font-size: 14px;
    }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }

    /* ==================== LOGIN PAGE ==================== */

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
    }

    .login-container {
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .login-logo-title {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(90deg, #60A5FA, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.5);
      color: #F8FAFC;
      font-size: 15px;
      transition: all 0.2s;
    }

    .login-input:focus {
      outline: none;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .login-input::placeholder {
      color: #64748B;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #3B82F6, #8B5CF6);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      padding: 12px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #EF4444;
      font-size: 14px;
      text-align: center;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(51, 65, 85, 0.5);
      border-radius: 8px;
      font-size: 13px;
    }

    .user-role {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .user-role.admin {
      background: rgba(245, 158, 11, 0.2);
      color: #F59E0B;
    }

    .user-role.user {
      background: rgba(59, 130, 246, 0.2);
      color: #60A5FA;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #94A3B8;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 13px;
    }

    .logout-btn:hover {
      color: #EF4444;
    }

    /* Pending Badge */
    .pending-badge {
      background: #F59E0B;
      color: #000;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 6px;
    }

    /* API Integration Item */
    .api-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .api-item-info h4 {
      margin: 0 0 4px 0;
      font-size: 15px;
    }

    .api-item-meta {
      font-size: 12px;
      color: #64748B;
    }

    .api-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: rgba(59, 130, 246, 0.2);
      color: #60A5FA;
      margin-right: 8px;
    }

    /* Analytics Sidebar */
    .analytics-sidebar {
      position: fixed;
      top: 0;
      right: -450px;
      width: 450px;
      height: 100vh;
      background: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
      border-left: 1px solid rgba(148, 163, 184, 0.2);
      z-index: 1002;
      transition: right 0.3s ease;
      overflow-y: auto;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
    }

    .analytics-sidebar.open {
      right: 0;
    }

    .analytics-header {
      padding: 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      position: sticky;
      top: 0;
      background: #1E293B;
      z-index: 10;
    }

    .analytics-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .analytics-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 4px 0;
    }

    .analytics-subtitle {
      font-size: 13px;
      color: #64748B;
    }

    .analytics-close {
      background: none;
      border: none;
      color: #64748B;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .analytics-close:hover {
      color: #E2E8F0;
    }

    .analytics-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 12px;
    }

    .analytics-status.up {
      background: rgba(34, 197, 94, 0.15);
      color: #22C55E;
    }

    .analytics-status.down {
      background: rgba(239, 68, 68, 0.15);
      color: #EF4444;
    }

    .analytics-content {
      padding: 20px;
    }

    .analytics-section {
      margin-bottom: 24px;
    }

    .analytics-section-title {
      font-size: 12px;
      font-weight: 600;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #E2E8F0;
    }

    .stat-value.green { color: #22C55E; }
    .stat-value.red { color: #EF4444; }
    .stat-value.yellow { color: #F59E0B; }
    .stat-value.blue { color: #3B82F6; }

    .stat-label {
      font-size: 12px;
      color: #64748B;
      margin-top: 4px;
    }

    .uptime-bar {
      height: 32px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 6px;
      display: flex;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .uptime-segment {
      height: 100%;
      min-width: 2px;
      position: relative;
    }

    .uptime-segment.up { background: #22C55E; }
    .uptime-segment.down { background: #EF4444; }
    .uptime-segment.unknown { background: #6B7280; }

    .uptime-segment:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #1E293B;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      border: 1px solid rgba(148, 163, 184, 0.2);
      z-index: 10;
    }

    .uptime-legend {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #64748B;
      margin-top: 8px;
    }

    .history-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid rgba(148, 163, 184, 0.05);
    }

    .history-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-status.up { background: #22C55E; }
    .history-status.down { background: #EF4444; }

    .history-info {
      flex: 1;
    }

    .history-time {
      font-size: 13px;
      color: #E2E8F0;
    }

    .history-message {
      font-size: 11px;
      color: #64748B;
      margin-top: 2px;
    }

    .history-ping {
      font-size: 12px;
      color: #3B82F6;
      font-weight: 500;
    }

    .response-chart {
      height: 120px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 10px 0;
    }

    .response-bar {
      flex: 1;
      background: #3B82F6;
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      transition: background 0.2s;
    }

    .response-bar:hover {
      background: #60A5FA;
    }

    .response-bar.slow {
      background: #F59E0B;
    }

    .response-bar.timeout {
      background: #EF4444;
    }

    .analytics-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1001;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .analytics-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    /* ============================================
       NEW FEATURES: Quick Wins + UX Improvements
       ============================================ */

    /* CSS Variables for Dark Mode */
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-tertiary: #334155;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --border-color: rgba(148, 163, 184, 0.2);
      --accent-blue: #3B82F6;
      --accent-green: #22C55E;
      --accent-red: #EF4444;
      --accent-yellow: #F59E0B;
      --accent-purple: #A78BFA;
    }

    /* Light mode (optional toggle) */
    body.light-mode {
      --bg-primary: #F1F5F9;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #E2E8F0;
      --text-primary: #1E293B;
      --text-secondary: #475569;
      --text-muted: #64748B;
      --border-color: rgba(71, 85, 105, 0.2);
    }

    body.light-mode {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
      color: var(--text-primary);
    }

    body.light-mode .title {
      background: linear-gradient(90deg, #2563EB, #7C3AED);
      -webkit-background-clip: text;
      background-clip: text;
    }

    body.light-mode .floor-tab {
      background: rgba(226, 232, 240, 0.8);
      color: var(--text-secondary);
    }

    body.light-mode .floor-plan-container,
    body.light-mode .sidebar,
    body.light-mode .status-card {
      background: rgba(255, 255, 255, 0.9);
      border-color: var(--border-color);
    }

    body.light-mode .device-popup {
      background: linear-gradient(135deg, #FFFFFF 0%, #F1F5F9 100%);
    }

    body.light-mode .analytics-sidebar {
      background: linear-gradient(180deg, #FFFFFF 0%, #F1F5F9 100%);
    }

    /* RTL Support for Hebrew */
    [dir="rtl"] {
      text-align: right;
    }

    [dir="rtl"] .header {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .status-cards {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .control-buttons {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .search-container {
      direction: ltr;
    }

    [dir="rtl"] .floor-tabs {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .main-content {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .sidebar {
      border-left: 1px solid var(--border-color);
      border-right: none;
    }

    [dir="rtl"] .device-item {
      flex-direction: row-reverse;
    }

    [dir="rtl"] .notification-dropdown {
      left: 0;
      right: auto;
    }

    /* Enhanced Summary Cards */
    .summary-bar {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.6);
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      flex-wrap: wrap;
      align-items: center;
    }

    .summary-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      min-width: 120px;
    }

    .summary-card-icon {
      font-size: 20px;
    }

    .summary-card-content {
      display: flex;
      flex-direction: column;
    }

    .summary-card-value {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .summary-card-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .summary-card.alert .summary-card-value {
      color: var(--accent-red);
    }

    .summary-card.warning .summary-card-value {
      color: var(--accent-yellow);
    }

    .summary-card.success .summary-card-value {
      color: var(--accent-green);
    }

    /* Search Bar */
    .search-container {
      position: relative;
      flex: 1;
      max-width: 300px;
      min-width: 200px;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: rgba(15, 23, 42, 0.5);
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-shortcut {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      padding: 2px 6px;
      background: rgba(51, 65, 85, 0.5);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      display: none;
    }

    .search-results.open {
      display: block;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.2s;
    }

    .search-result-item:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-icon {
      font-size: 18px;
    }

    .search-result-info {
      flex: 1;
    }

    .search-result-name {
      font-weight: 500;
      font-size: 14px;
    }

    .search-result-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .search-result-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .search-no-results {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
    }

    /* Control Buttons (Dark Mode, Sound, Kiosk) */
    .control-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .control-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: rgba(51, 65, 85, 0.5);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }

    .control-btn:hover {
      background: rgba(59, 130, 246, 0.2);
      border-color: var(--accent-blue);
      color: var(--text-primary);
    }

    .control-btn.active {
      background: rgba(59, 130, 246, 0.3);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    .control-btn.muted {
      color: var(--accent-red);
    }

    /* Notification Center */
    .notification-btn-wrapper {
      position: relative;
    }

    .notification-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--accent-red);
      color: white;
      font-size: 10px;
      font-weight: 600;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .notification-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 360px;
      max-height: 480px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      overflow: hidden;
      display: none;
    }

    .notification-dropdown.open {
      display: block;
    }

    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      background: rgba(30, 41, 59, 0.5);
    }

    .notification-header h4 {
      font-size: 14px;
      font-weight: 600;
    }

    .notification-header button {
      background: none;
      border: none;
      color: var(--accent-blue);
      font-size: 12px;
      cursor: pointer;
    }

    .notification-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .notification-item {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      transition: background 0.2s;
    }

    .notification-item:hover {
      background: rgba(59, 130, 246, 0.1);
    }

    .notification-item.unread {
      background: rgba(59, 130, 246, 0.05);
    }

    .notification-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .notification-icon.error { background: rgba(239, 68, 68, 0.2); }
    .notification-icon.success { background: rgba(34, 197, 94, 0.2); }
    .notification-icon.warning { background: rgba(245, 158, 11, 0.2); }
    .notification-icon.info { background: rgba(59, 130, 246, 0.2); }

    .notification-content {
      flex: 1;
      min-width: 0;
    }

    .notification-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .notification-message {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notification-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .notification-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    /* Context Menu (Quick Actions) */
    .context-menu {
      position: fixed;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      z-index: 10000;
      min-width: 180px;
      overflow: hidden;
      display: none;
    }

    .context-menu.open {
      display: block;
    }

    .context-menu-header {
      padding: 10px 14px;
      background: rgba(30, 41, 59, 0.8);
      border-bottom: 1px solid var(--border-color);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-primary);
      transition: background 0.15s;
    }

    .context-menu-item:hover {
      background: rgba(59, 130, 246, 0.2);
    }

    .context-menu-item.danger:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #EF4444;
    }

    .context-menu-divider {
      height: 1px;
      background: var(--border-color);
      margin: 4px 0;
    }

    .context-menu-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    /* Dashboard Widgets */
    .widgets-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .widget {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      min-height: 160px;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .widget-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .widget-actions {
      display: flex;
      gap: 4px;
    }

    .widget-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 4px;
      border-radius: 4px;
    }

    .widget-btn:hover {
      background: rgba(59, 130, 246, 0.2);
      color: var(--accent-blue);
    }

    .widget-content {
      height: calc(100% - 36px);
    }

    /* Status Pie Chart Widget */
    .status-pie {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .pie-chart {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      position: relative;
    }

    .pie-legend {
      flex: 1;
    }

    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .pie-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Mini Bar Chart */
    .mini-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 60px;
    }

    .mini-bar {
      flex: 1;
      background: var(--accent-blue);
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      transition: height 0.3s;
    }

    .mini-bar.down {
      background: var(--accent-red);
    }

    /* Recent Incidents Widget */
    .widget-incident {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 12px;
    }

    .widget-incident:last-child {
      border-bottom: none;
    }

    .widget-incident-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .widget-incident-status.active {
      background: var(--accent-red);
      animation: pulse 2s infinite;
    }

    .widget-incident-status.resolved {
      background: var(--accent-green);
    }

    /* WebSocket Status Indicator */
    .ws-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .ws-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6B7280;
    }

    .ws-dot.connected {
      background: #22C55E;
    }

    .ws-dot.connecting {
      background: #F59E0B;
      animation: pulse 1s infinite;
    }

    /* Activity Log & Incident History Views */
    .special-view {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      margin-top: 16px;
    }

    .special-view-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .special-view-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .special-view-filters {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .filter-select {
      background: rgba(51, 65, 85, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 13px;
    }

    .activity-table, .incident-table {
      width: 100%;
      border-collapse: collapse;
    }

    .activity-table th, .incident-table th {
      text-align: left;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.5);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .activity-table td, .incident-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 13px;
    }

    .activity-action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .activity-action.create { background: rgba(34, 197, 94, 0.2); color: #22C55E; }
    .activity-action.update { background: rgba(59, 130, 246, 0.2); color: #3B82F6; }
    .activity-action.delete { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
    .activity-action.login { background: rgba(139, 92, 246, 0.2); color: #8B5CF6; }
    .activity-action.maintenance { background: rgba(245, 158, 11, 0.2); color: #F59E0B; }

    .incident-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .incident-status.active { background: rgba(239, 68, 68, 0.2); color: #EF4444; }
    .incident-status.resolved { background: rgba(34, 197, 94, 0.2); color: #22C55E; }

    .incident-duration {
      font-family: monospace;
      color: var(--text-muted);
    }

    /* Export buttons */
    .export-btn {
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid var(--accent-blue);
      color: var(--accent-blue);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .export-btn:hover {
      background: rgba(59, 130, 246, 0.3);
    }

    /* Kiosk Mode */
    body.kiosk-mode {
      padding: 16px;
    }

    body.kiosk-mode .header {
      margin-bottom: 12px;
      padding-bottom: 12px;
    }

    body.kiosk-mode .user-info,
    body.kiosk-mode .header-btn,
    body.kiosk-mode .control-buttons,
    body.kiosk-mode .sidebar,
    body.kiosk-mode .legend,
    body.kiosk-mode .search-container {
      display: none !important;
    }

    body.kiosk-mode .floor-tabs {
      margin-bottom: 12px;
    }

    body.kiosk-mode .floor-plan-container {
      height: calc(100vh - 180px);
    }

    body.kiosk-mode .main-content {
      display: block;
    }

    body.kiosk-mode .summary-bar {
      margin-bottom: 12px;
    }

    body.kiosk-mode .kiosk-exit {
      display: block !important;
    }

    .kiosk-exit {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      padding: 8px 16px;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid var(--accent-red);
      border-radius: 8px;
      color: var(--accent-red);
      cursor: pointer;
      font-size: 14px;
    }

    .kiosk-exit:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* Auto-cycle indicator for Kiosk */
    .kiosk-indicator {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(30, 41, 59, 0.9);
      border-radius: 20px;
      border: 1px solid var(--border-color);
    }

    .kiosk-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      transition: all 0.3s;
    }

    .kiosk-dot.active {
      background: var(--accent-blue);
      transform: scale(1.2);
    }

    /* Heat Map Overlay */
    .heat-map-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.3;
      border-radius: 12px;
      transition: opacity 0.3s;
    }

    .heat-map-overlay.healthy {
      background: radial-gradient(circle at center, rgba(34, 197, 94, 0.4) 0%, transparent 70%);
    }

    .heat-map-overlay.warning {
      background: radial-gradient(circle at center, rgba(245, 158, 11, 0.4) 0%, transparent 70%);
    }

    .heat-map-overlay.critical {
      background: radial-gradient(circle at center, rgba(239, 68, 68, 0.4) 0%, transparent 70%);
    }

    /* Keyboard Shortcuts Modal */
    .shortcuts-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .shortcuts-modal.open {
      display: flex;
    }

    .shortcuts-content {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      border: 1px solid var(--border-color);
    }

    .shortcuts-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .shortcuts-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .shortcut-row:last-child {
      border-bottom: none;
    }

    .shortcut-key {
      display: inline-flex;
      gap: 4px;
    }

    .shortcut-key kbd {
      padding: 4px 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
      border: 1px solid var(--border-color);
    }

    /* Responsive Design for iPad and Mobile */
    @media (max-width: 1200px) {
      .main-content {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        max-height: 300px;
        order: 2;
      }

      .floor-plan-container {
        min-height: 400px;
        height: 50vh;
      }

      .summary-bar {
        flex-wrap: wrap;
      }

      .summary-card {
        min-width: calc(50% - 6px);
      }
    }

    @media (max-width: 900px) {
      body {
        padding: 16px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .header > div:last-child {
        width: 100%;
        flex-wrap: wrap;
      }

      .status-cards {
        order: 1;
        width: 100%;
        justify-content: space-between;
      }

      .header-actions {
        order: 2;
        width: 100%;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .floor-tabs {
        flex-wrap: wrap;
      }

      .floor-tab {
        flex: 1 1 calc(50% - 4px);
        min-width: calc(50% - 4px);
      }

      .search-container {
        max-width: 100%;
        width: 100%;
        order: 0;
        margin-bottom: 8px;
      }

      .title {
        font-size: 22px;
      }

      .summary-card {
        min-width: calc(50% - 6px);
        padding: 8px 12px;
      }

      .summary-card-value {
        font-size: 16px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .floor-tab {
        flex: 1 1 100%;
        padding: 12px 16px;
      }

      .status-card {
        padding: 8px 12px;
      }

      .status-number {
        font-size: 20px;
      }

      .device-popup {
        min-width: 200px;
        padding: 12px;
      }

      .analytics-sidebar {
        width: 100%;
        right: -100%;
      }

      .summary-card {
        min-width: 100%;
      }

      .control-buttons {
        width: 100%;
        justify-content: flex-end;
      }
    }

    /* Touch-friendly adjustments */
    @media (pointer: coarse) {
      .device-dot {
        width: 32px;
        height: 32px;
      }

      .floor-tab {
        padding: 18px 24px;
      }

      .control-btn {
        width: 44px;
        height: 44px;
      }

      .search-result-item {
        padding: 16px;
      }

      .header-btn {
        padding: 12px 16px;
      }
    }

    /* Print styles for reports */
    @media print {
      body {
        background: white;
        color: black;
      }

      .header-actions,
      .control-buttons,
      .search-container,
      .admin-panel,
      .analytics-sidebar {
        display: none !important;
      }
    }

    /* Highlight animation for search results */
    @keyframes highlight-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      50% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
    }

    .device-marker.search-highlight .device-dot {
      animation: highlight-pulse 1s ease-in-out 3;
    }

    /* Sound notification indicator */
    .sound-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(239, 68, 68, 0.9);
      color: white;
      padding: 20px 40px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      z-index: 9999;
      display: none;
      animation: fadeInOut 3s ease-in-out;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      10% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      90% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    }

    /* Maintenance Mode Styles */
    .device-marker.maintenance .device-dot {
      background: #F59E0B !important;
      border-color: #D97706 !important;
    }

    .device-marker.maintenance .device-ping {
      background: #FBBF24 !important;
    }

    .maintenance-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 14px;
      height: 14px;
      background: #F59E0B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      border: 2px solid var(--bg-secondary);
    }

    .maintenance-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 8px;
      margin-top: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .maintenance-toggle:hover {
      background: rgba(245, 158, 11, 0.2);
    }

    .maintenance-toggle.active {
      background: rgba(245, 158, 11, 0.3);
      border-color: #F59E0B;
    }

    .maintenance-input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: rgba(15, 23, 42, 0.5);
      color: var(--text-primary);
      font-size: 13px;
      margin-top: 8px;
    }

    /* Threshold Alerts Bar */
    .alerts-bar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .alerts-bar.warning {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .alert-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .alert-item:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    .alert-icon {
      font-size: 14px;
    }

    .alert-text {
      color: var(--text-primary);
    }

    .alert-value {
      font-weight: 600;
      color: #EF4444;
    }

    .alert-value.warning {
      color: #F59E0B;
    }

    /* Sidebar device maintenance indicator */
    .device-item.maintenance {
      border-left: 3px solid #F59E0B;
      opacity: 0.7;
    }

    .device-item.maintenance .device-status-dot {
      background: #F59E0B !important;
    }
  </style>

    // Play alert sound

      if (!soundEnabled) return;
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.frequency.value = 440;
        oscillator.type = 'sine';
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
      } catch (e) {
        console.log('Audio not supported');
      }
    }

        const wasDown = previousDeviceStatuses[deviceKey] === 'down';

        if (isDown && !wasDown) {
          newFailures.push(device.name);
        }

        previousDeviceStatuses[deviceKey] = isDown ? 'down' : 'up';

    // Enable GPS-based location
    function enableGPSLocation() {
      document.getElementById('location-modal')?.remove();

      if (!navigator.geolocation) {
        alert('Geolocation is not supported by your browser');
        return;
      }

      // Request permission and start watching
      navigator.geolocation.getCurrentPosition(
        (position) => {
          locationEnabled = true;
          localStorage.setItem('locationEnabled', 'true');
          lastGeoPosition = position;

          // Convert GPS to map coordinates
          updateLocationFromGPS(position);

          // Start continuous tracking
          geoWatchId = navigator.geolocation.watchPosition(
            updateLocationFromGPS,
            (error) => console.log('Location error:', error.message),
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
          );

          render();
        },
        (error) => {
          alert('Unable to get your location: ' + error.message + '\\n\\nTry using "Set Manually" instead.');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // Update location from GPS coordinates
    function updateLocationFromGPS(position) {
      const { latitude, longitude, altitude, accuracy } = position.coords;

      // Check if within office bounds
      if (latitude < OFFICE_BOUNDS.south || latitude > OFFICE_BOUNDS.north ||
          longitude < OFFICE_BOUNDS.west || longitude > OFFICE_BOUNDS.east) {
        // Outside office - still show but with a note
        console.log('Location outside office bounds');
      }

      // Convert GPS to percentage position on map
      const x = ((longitude - OFFICE_BOUNDS.west) / (OFFICE_BOUNDS.east - OFFICE_BOUNDS.west)) * 100;
      const y = ((OFFICE_BOUNDS.north - latitude) / (OFFICE_BOUNDS.north - OFFICE_BOUNDS.south)) * 100;

      // Clamp to valid range
      userLocation = {
        x: Math.max(0, Math.min(100, x)),
        y: Math.max(0, Math.min(100, y)),
        accuracy: accuracy,
        source: 'gps'
      };

      // Determine floor based on altitude (if available)
      if (altitude !== null) {
        for (const [floor, bounds] of Object.entries(OFFICE_BOUNDS.floors)) {
          if (altitude >= bounds.minAlt && altitude < bounds.maxAlt) {
            userLocationFloor = floor;
            break;
          }
        }
      }

      localStorage.setItem('userLocation', JSON.stringify(userLocation));
      if (userLocationFloor) {
        localStorage.setItem('userLocationFloor', userLocationFloor);
      }

      render();
    }

      userLocation = { x, y, accuracy: 5, source: 'manual' };
      userLocationFloor = activeFloor;

      localStorage.setItem('userLocation', JSON.stringify(userLocation));

    function formatTimeAgo(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMins / 60);
      const diffDays = Math.floor(diffHours / 24);

      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString();
    }

    function formatDuration(seconds) {
      if (!seconds) return '-';
      if (seconds < 60) return `${seconds}s`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ${seconds % 60}s`;
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      return `${hours}h ${mins}m`;
    }

    // ==================== CSV EXPORT HELPER ====================

    function downloadCSV(data, filename) {
      const csv = data.map(row =>
        row.map(cell => {
          const cellStr = String(cell);
          if (cellStr.includes(',') || cellStr.includes('"') || cellStr.includes('\n')) {
            return '"' + cellStr.replace(/"/g, '""') + '"';
          }
          return cellStr;
        }).join(',')
      ).join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
      showToast(`Exported ${filename}`);
    }

    // ==================== WEBSOCKET CLIENT ====================

    function connectWebSocket() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      const wsUrl = API_URL.replace('http', 'ws');
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        wsConnected = true;
        console.log('WebSocket connected');
        if (wsReconnectTimer) {
          clearTimeout(wsReconnectTimer);
          wsReconnectTimer = null;
        }
        render(); // Update UI to show connected status
      };

      ws.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          handleWebSocketMessage(message);
        } catch (e) {
          console.error('Failed to parse WebSocket message:', e);
        }
      };

      ws.onclose = () => {
        wsConnected = false;
        console.log('WebSocket disconnected, reconnecting in 5s...');
        wsReconnectTimer = setTimeout(connectWebSocket, 5000);
        render();
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        wsConnected = false;
      };
    }

    function handleWebSocketMessage(message) {
      switch (message.type) {
        case 'status_update':
          handleStatusUpdate(message.data);
          break;
        case 'notification':
          userNotifications.unshift(message.data);
          notificationUnreadCount++;
          showToast(`${message.data.title}`, message.data.severity === 'error' ? 'error' : 'success');
          render();
          break;
        case 'incident':
          if (message.data.action === 'created') {
            recentIncidents.unshift(message.data);
            incidents.unshift(message.data);
          } else if (message.data.action === 'resolved') {
            const idx = recentIncidents.findIndex(i => i.id === message.data.id);
            if (idx >= 0) recentIncidents[idx] = { ...recentIncidents[idx], ...message.data, ended_at: new Date().toISOString() };
          }
          render();
          break;
        case 'alert':
          thresholdAlerts.push(message.data);
          render();
          break;
        case 'heartbeat':
          // Connection is alive
          break;
      }
    }

    function handleStatusUpdate(data) {
      // Update local data store
      Object.keys(uptimeKumaData).forEach(floor => {
        ['accessPoints', 'printers'].forEach(type => {
          const devices = uptimeKumaData[floor][type] || [];
          const device = devices.find(d => d.id === data.deviceId);
          if (device) {
            const oldStatus = device.status;
            device.status = data.status === 'up' ? 'up' : 'down';
            device.ping = data.ping;

            // Play sound if status changed to down
            if (oldStatus !== device.status && device.status === 'down' && soundEnabled) {
              playAlertSound();
            }
          }
        });
      });

      // Re-render to update UI
      render();
    }

      if (authToken && currentUser) {
        connectWebSocket();
      }
    }

    async function pingDevice(host) {
      hideContextMenu();
      if (!host) {
        showToast('No IP address available', 'error');
        return;
      }
      showToast(`Pinging ${host}...`);

      try {
        const response = await authFetch(`${API_URL}/api/monitors/ping/${encodeURIComponent(host)}`);
        const data = await response.json();
        if (data.success && data.alive) {
          showToast(`${host} is reachable (${data.time}ms)`, 'success');
        } else {
          showToast(`${host} is not reachable`, 'error');
        }
      } catch (e) {
        showToast(`Ping failed: ${e.message}`, 'error');
      }
    }

    function copyToClipboard(text) {
      hideContextMenu();
      if (!text) {
        showToast('Nothing to copy', 'error');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        showToast(`Copied: ${text}`);
      }).catch(() => {
        showToast('Failed to copy', 'error');
      });
    }

    // Search functionality
    function handleSearch(query) {
      searchQuery = query.toLowerCase();
      const resultsContainer = document.getElementById('search-results');

      if (!query.trim()) {
        searchOpen = false;
        if (resultsContainer) resultsContainer.classList.remove('open');
        return;
      }

      const allDevices = getAllDevicesForSearch();
      const filtered = allDevices.filter(d =>
        d.name.toLowerCase().includes(searchQuery) ||
        (d.ip && d.ip.toLowerCase().includes(searchQuery)) ||
        (d.floor && d.floor.toLowerCase().includes(searchQuery))
      ).slice(0, 10);

      searchOpen = true;
      if (resultsContainer) {
        resultsContainer.classList.add('open');
        resultsContainer.innerHTML = filtered.length > 0 ? filtered.map(device => `
          <div class="search-result-item" onclick="goToDevice('${device.id}', '${device.floor}', '${device.type}', '${device.name.replace(/'/g, "\\'")}')">
            <span class="search-result-icon">${device.icon}</span>
            <div class="search-result-info">
              <div class="search-result-name">${device.name}</div>
              <div class="search-result-meta">${device.floor || 'Unknown'} • ${device.ip || 'No IP'}</div>
            </div>
            <div class="search-result-status" style="background: ${device.status === 'up' || device.connected ? '#22C55E' : '#EF4444'};"></div>
          </div>
        `).join('') : '<div class="search-no-results">No devices found</div>';
      }
    }

    // Get all devices for search
    function getAllDevicesForSearch() {
      const devices = [];

      Object.entries(uptimeKumaData).forEach(([floor, floorData]) => {
        if (floorData.accessPoints) {
          floorData.accessPoints.forEach(d => devices.push({
            ...d, floor, type: 'accessPoints', icon: '📡'
          }));
        }
        if (floorData.printers) {
          floorData.printers.forEach(d => devices.push({
            ...d, floor, type: 'printers', icon: '🖨️'
          }));
        }
      });

      Object.entries(polyLensData).forEach(([floor, polyDevices]) => {
        polyDevices.forEach(d => devices.push({
          id: d.id,
          name: d.name || d.room,
          ip: d.ip,
          status: d.connected ? 'up' : 'down',
          connected: d.connected,
          floor,
          type: 'polyLens',
          icon: '📹'
        }));
      });

      return devices;
    }

      const floors = Object.keys(uptimeKumaData).length > 0
        ? Object.keys(uptimeKumaData)
        : ['1st Floor', '2nd Floor', '3rd Floor', '5th Floor'];

      switch(e.key) {
        case '/':
          e.preventDefault();
          document.getElementById('search-input')?.focus();
          break;
        case '1':
        case '2':
        case '3':
        case '4':
        case '5':
          const floorIndex = parseInt(e.key) - 1;
          if (floors[floorIndex]) {
            activeFloor = floors[floorIndex];
            render();
          }
          break;
        case 'f':
        case 'F':
          if (!e.ctrlKey && !e.metaKey) {
            toggleKioskMode();
          }
          break;
        case 'd':
        case 'D':
          toggleDarkMode();
          break;
        case 'm':
        case 'M':
          toggleSound();
          break;
        case 'l':
        case 'L':
          toggleLocation();
          break;
        case 'n':
        case 'N':
          toggleNotificationDropdown();
          break;
        case '?':
          toggleShortcutsModal();
          break;
        case 'Escape':
          if (notificationDropdownOpen) { notificationDropdownOpen = false; render(); }
          if (shortcutsModalOpen) toggleShortcutsModal();
          if (kioskMode) toggleKioskMode();
          closeAnalytics();
          break;
      }

    // Calculate heat map status for a floor
    function getFloorHealthStatus(floorData, polyData) {
      const counts = getStatusCounts(floorData, polyData);
      const total = counts.total + (polyData?.length || 0);
      if (total === 0) return 'healthy';

      const downPercent = (counts.down / total) * 100;
      if (downPercent >= 20) return 'critical';
      if (downPercent >= 5) return 'warning';
      return 'healthy';
    }

    // Get summary stats for dashboard
    function getSummaryStats() {
      let totalDevices = 0;
      let totalDown = 0;
      let totalUp = 0;
      let lowTonerPrinters = 0;
      let uptimeSum = 0;
      let uptimeCount = 0;

      Object.values(uptimeKumaData).forEach(floorData => {
        ['accessPoints', 'printers'].forEach(type => {
          if (floorData[type]) {
            floorData[type].forEach(d => {
              totalDevices++;
              if (d.status === 'up') totalUp++;
              else totalDown++;
            });
          }
        });
      });

      Object.values(polyLensData).forEach(devices => {
        devices.forEach(d => {
          totalDevices++;
          if (d.connected) totalUp++;
          else totalDown++;
        });
      });

      const uptimePercent = totalDevices > 0 ? Math.round((totalUp / totalDevices) * 100) : 100;

      return { totalDevices, totalDown, totalUp, uptimePercent, lowTonerPrinters };
    }

    function generatePositions(count, seed) {
      const positions = [];
      for (let i = 0; i < count; i++) {
        const angle = (seed + i * 137.5) % 360;
        const radius = 25 + ((seed * i) % 20);
        positions.push({
          x: 50 + radius * Math.cos(angle * Math.PI / 180) * 0.8,
          y: 50 + radius * Math.sin(angle * Math.PI / 180) * 0.6
        });
      }
      return positions;
    }

    function getStatusCounts(floorData, polyData) {
      let up = 0, down = 0;

      // Count from Uptime Kuma
      if (floorData) {
        Object.values(floorData).forEach(category => {
          if (Array.isArray(category)) {
            category.forEach(device => {
              if (device.status === 'up') up++;
              else if (device.status === 'down') down++;
            });
          }
        });
      }

      return { up, down, total: up + down };
    }

    function getPolyLensRooms(floor) {
      const devices = polyLensData[floor] || [];
      const rooms = {};

      devices.forEach(device => {
        const roomName = device.room || 'Unassigned';
        if (!rooms[roomName]) {
          rooms[roomName] = [];
        }
        rooms[roomName].push(device);
      });

      return rooms;
    }

        if (response.ok) {
          await fetchSettings();
          return { success: true };

        return { success: false, error: 'Save failed' };
      } catch (e) {
        return { success: false, error: e.message };

    async function saveMonitor(monitor) {
      const isNew = !monitor.id;
      const url = isNew ? `${API_URL}/api/monitors` : `${API_URL}/api/monitors/${monitor.id}`;
      const method = isNew ? 'POST' : 'PUT';

      try {
        const response = await authFetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(monitor)
        });
        const data = await response.json();
        if (data.success) {
          if (data.pending) {
            showAlert(data.message, 'success');
          }
          await fetchAllMonitors();
          await fetchAllData();
          return { success: true };
        }
        return { success: false, error: 'Save failed' };
      } catch (e) {
        return { success: false, error: e.message };
      }
    }

    async function deleteMonitor(id) {
      if (!confirm('Are you sure you want to delete this monitor?')) return { success: false };

      try {
        const response = await authFetch(`${API_URL}/api/monitors/${id}`, { method: 'DELETE' });
        const data = await response.json();
        if (data.success) {
          if (data.pending) {
            showAlert(data.message, 'success');
          }
          await fetchAllMonitors();
          await fetchAllData();
          return { success: true };
        }
        return { success: false, error: 'Delete failed' };
      } catch (e) {
        return { success: false, error: e.message };
      }
    }

        const response = await authFetch(`${API_URL}/api/monitors/${id}/toggle`, { method: 'PATCH' });
        if (response.ok) {

          return { success: true };

    async function saveDevicePosition(id, pos_x, pos_y) {
      try {
        const response = await authFetch(`${API_URL}/api/monitors/${id}/position`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pos_x, pos_y })

        return response.ok;

        console.error('Failed to save position:', e);
        return false;
      }
